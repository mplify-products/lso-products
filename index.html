<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSO Products</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3"></script>
<style>
  :root {
    --status-published: #1a8b3a;
    --status-in-development: #f08c1f;
    --status-planned: #1f5fbf;
    --status-area: #9aa0a6;
    --link-fill: #d8d8d8;
    --link-fill-faded: #ececec;
    --link-fill-highlight: #b8b8b8;
    --bg: #ffffff;
    --text: #202124;
    --text-muted: #5f6368;
    --column-header: #202124;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  #app { width: 100vw; min-height: 100vh; padding: 24px 32px; position: relative; }
  @media (max-width: 900px) { #app { padding: 16px 12px; } }
  h1 { font-size: 28px; font-weight: 500; margin: 0 0 8px 0; letter-spacing: -0.01em; }
  #legend { position: absolute; top: 28px; right: 32px; display: flex; gap: 18px; font-size: 12px; color: var(--text); }
  #legend .item { display: flex; align-items: center; gap: 6px; }
  #legend .swatch { width: 14px; height: 14px; border-radius: 2px; display: inline-block; }
  #status { padding: 16px 0; color: var(--text-muted); font-size: 13px; }
  #status:empty { padding: 0; }
  #chart-wrap { width: 100%; }
  svg { display: block; }
  .col-header { font-size: 13px; font-weight: 500; fill: var(--column-header); }
  .help-icon circle, .help-icon rect { transition: fill 120ms ease, stroke 120ms ease; }
  .help-icon:hover > circle:first-child, .help-icon:focus > circle:first-child { fill: #f1f3f4; stroke: #5f6368; }
  .help-icon:hover .info-tittle, .help-icon:hover .info-stem,
  .help-icon:focus .info-tittle, .help-icon:focus .info-stem { fill: #202124; }
  .help-icon:focus { outline: none; }
  .help-icon:focus-visible > circle:first-child { stroke: var(--status-planned); stroke-width: 1.5; }
  .node rect { cursor: pointer; transition: opacity 120ms ease; }
  .node text { font-size: 12px; fill: var(--text); pointer-events: none; }
  .node a { cursor: pointer; }
  .node a text { pointer-events: auto; }
  .node a:hover text { text-decoration: underline; }
  .node a:focus { outline: none; }
  .node a:focus-visible text { text-decoration: underline; outline: 2px solid var(--status-planned); outline-offset: 2px; border-radius: 2px; }
  .node.dim rect, .node.dim text { opacity: 0.25; }
  .link { fill: none; stroke: var(--link-fill); stroke-opacity: 0.6; transition: stroke 120ms ease, stroke-opacity 120ms ease; }
  .link.dim { stroke: var(--link-fill-faded); stroke-opacity: 0.4; }
  .link.highlight { stroke: var(--link-fill-highlight); stroke-opacity: 0.95; }
  .node-hit { cursor: pointer; fill: transparent; }
  #error { color: #b00020; padding: 16px 0; font-size: 13px; }
  .tooltip { position: fixed; pointer-events: none; background: rgba(32,33,36,0.95); color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 12px; line-height: 1.4; transform: translate(-50%, calc(-100% - 10px)); max-width: 320px; opacity: 0; transition: opacity 100ms ease; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 1000; }
  .tooltip.visible { opacity: 1; }
  @media (max-width: 900px) { h1 { font-size: 22px; } #legend { position: static; margin-top: 8px; flex-wrap: wrap; } }
</style>
</head>
<body>
<div id="app">
  <h1>LSO Products</h1>
  <div id="legend"></div>
  <div id="status">Loading data…</div>
  <div id="error"></div>
  <div id="chart-wrap"><svg id="chart"></svg></div>
  <div class="tooltip" id="tooltip"></div>
</div>

<script>
/* =====================================================================
   LSO Products Sankey
   Data source: Google Sheet published as CSV (per-tab gid).
   Tabs expected: nodes, links, type_order, legend
   --------------------------------------------------------------------- */

// Sheet ID and tab gids (filled in from the source sheet).
const SHEET_ID = "1XNiWZ6RqXgCI5jWVvK94CuvNQVt8mFlC84UD5-ZdFeY";

// Tab gids — the user must publish each tab to web as CSV.
// "nodes" tab gid is known (1203637575). The others are auto-discovered
// at runtime by trying named-range queries via gviz; if that fails, the
// user can supply gids in the URL query string: ?nodes=...&links=...&type_order=...&legend=...
const DEFAULT_GIDS = {
  nodes: "1203637575"
  // links, type_order, legend gids resolved via gviz "sheet" parameter (by tab name)
};

// CSV endpoint by gid:
const csvByGid = (gid) =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
// CSV endpoint by sheet name (works when the sheet is "Anyone with the link can view"
// AND "Publish to web" is enabled; tab names with spaces should be URL-encoded):
const csvBySheetName = (name) =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;

// Status -> color mapping
const STATUS_COLOR = {
  green:  "var(--status-published)",
  orange: "var(--status-in-development)",
  blue:   "var(--status-planned)",
  grey:   "var(--status-area)",
  gray:   "var(--status-area)"
};
const STATUS_LABEL = {
  green:  "Published",
  orange: "In Development",
  blue:   "Planned",
  grey:   "Area",
  gray:   "Area"
};

// ---------- helpers ----------
function qs(name) {
  const u = new URL(window.location.href);
  return u.searchParams.get(name);
}

async function fetchCsv(url) {
  const res = await fetch(url, { redirect: "follow" });
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${url}`);
  const text = await res.text();
  return d3.csvParse(text);
}

// Try by-gid first (if provided), then fall back to by-sheet-name.
async function loadTab(name) {
  const overrideGid = qs(name);
  const gid = overrideGid || DEFAULT_GIDS[name];
  const attempts = [];
  if (gid) attempts.push(csvByGid(gid));
  attempts.push(csvBySheetName(name));
  let lastErr;
  for (const url of attempts) {
    try {
      const rows = await fetchCsv(url);
      if (rows && rows.length) return rows;
    } catch (e) { lastErr = e; }
  }
  throw new Error(`Could not load tab "${name}". ${lastErr ? lastErr.message : ""}`);
}

// ---------- main ----------
(async function main() {
  const statusEl = document.getElementById("status");
  const errorEl  = document.getElementById("error");
  try {
    statusEl.textContent = "Loading data…";

    const [nodesRows, linksRows, typeOrderRows, legendRows] = await Promise.all([
      loadTab("nodes"),
      loadTab("links"),
      loadTab("type_order"),
      loadTab("legend").catch(() => null) // legend is optional
    ]);

    statusEl.textContent = "";

    // Normalise nodes
    const nodes = nodesRows
      .filter(r => r.name && r.name.trim())
      .map(r => {
        const orderRaw = (r.order || r.Order || r.sort || r.Sort || "").toString().trim();
        const orderNum = orderRaw === "" ? null : Number(orderRaw);
        return {
          name:   r.name.trim(),
          type:   (r.type   || "").trim(),
          url:    (r.url    || "").trim(),
          status: (r.status || "").trim().toLowerCase(),
          order:  Number.isFinite(orderNum) ? orderNum : null
        };
      });

    // Normalise links (expect columns: source, target [, value])
    // Header names may vary; accept "from"/"to" too.
    const linkKey = (row, candidates) => {
      for (const k of candidates) if (row[k] != null && row[k] !== "") return row[k];
      return null;
    };
    const links = linksRows
      .map(r => ({
        source: (linkKey(r, ["source", "Source", "from", "From"]) || "").toString().trim(),
        target: (linkKey(r, ["target", "Target", "to",   "To"  ]) || "").toString().trim(),
        value:  +(linkKey(r, ["value",  "Value", "weight"]) || 1)
      }))
      .filter(l => l.source && l.target);

    // type_order: ordered list of column types with optional help text.
    // Expected columns: `type` (the column name) and optionally `help` (the
    // tooltip text). Falls back to a single-column list if `type` isn't
    // present, or to the unique types found on nodes if the tab is empty.
    const typeOrderEntries = (() => {
      if (!typeOrderRows.length) return [];
      const headers = Object.keys(typeOrderRows[0]);
      const typeKey = headers.find(h => /^type$/i.test(h)) || headers[0];
      const helpKey = headers.find(h => /^help$/i.test(h)) ||
                      headers.find(h => /^(description|tooltip|info)$/i.test(h));
      return typeOrderRows
        .map(r => ({
          type: (r[typeKey] || "").toString().trim(),
          help: helpKey ? (r[helpKey] || "").toString().trim() : ""
        }))
        .filter(e => e.type);
    })();
    const typeOrder = typeOrderEntries.length
      ? typeOrderEntries.map(e => e.type)
      : Array.from(new Set(nodes.map(n => n.type)));
    const typeHelp = new Map(typeOrderEntries.map(e => [e.type, e.help]));

    // legend (optional): columns like status, label
    // Legend: maps a status (colour key) to its display label.
    // Accepts a range of column names so the sheet author can use whichever
    // naming feels natural: status/color/colour for the key, label/name/text
    // for the display string. Status values are normalised to lowercase to
    // match the STATUS_COLOR/STATUS_LABEL maps.
    const pickField = (row, candidates) => {
      for (const k of candidates) {
        if (row[k] != null && String(row[k]).trim() !== "") return String(row[k]);
      }
      // Case-insensitive fallback in case the user capitalised differently
      const lower = candidates.map(c => c.toLowerCase());
      for (const key of Object.keys(row)) {
        if (lower.includes(key.toLowerCase()) && row[key] != null && String(row[key]).trim() !== "") {
          return String(row[key]);
        }
      }
      return "";
    };
    const legend = (legendRows || []).map(r => ({
      status: pickField(r, ["status", "color", "colour", "key"]).trim().toLowerCase(),
      label:  pickField(r, ["label", "name", "text", "display"]).trim()
    })).filter(l => l.status);

    if (!legend.length && legendRows && legendRows.length) {
      console.warn(
        "Legend tab loaded but no rows could be parsed. " +
        "Expected columns named 'status' (or 'color'/'colour') and 'label' (or 'name'/'text'). " +
        "Found columns:", Object.keys(legendRows[0])
      );
    }

    // Let the legend tab override the default status labels everywhere
    // (including node hover tooltips). Anything not specified in the tab keeps
    // its hardcoded default.
    legend.forEach(l => {
      if (l.label) STATUS_LABEL[l.status] = l.label;
    });

    renderLegend(legend);

    // Initial render. We re-call this on iframe resize so layout adapts.
    let redrawScheduled = false;
    function redraw() {
      renderSankey({ nodes, links, typeOrder, typeHelp });
      // After layout settles, tell the parent (if any) what total height the
      // content needs. Use rAF to ensure the DOM has applied all measurements.
      requestAnimationFrame(() => requestAnimationFrame(reportHeightToParent));
    }
    function scheduleRedraw() {
      if (redrawScheduled) return;
      redrawScheduled = true;
      requestAnimationFrame(() => {
        redrawScheduled = false;
        redraw();
      });
    }
    redraw();

    // Watch the chart wrap for size changes (iframe resize, parent layout
    // changes, devtools opening, etc.) and redraw to fit.
    if (typeof ResizeObserver !== "undefined") {
      const ro = new ResizeObserver(() => scheduleRedraw());
      ro.observe(document.getElementById("chart-wrap"));
    } else {
      window.addEventListener("resize", scheduleRedraw);
    }
    // Also report height on plain window resize (covers fonts loading, scrollbar
    // appearing, etc.).
    window.addEventListener("resize", reportHeightToParent);
  } catch (err) {
    statusEl.textContent = "";
    errorEl.innerHTML =
      `Failed to load data: ${err.message}<br>` +
      `Make sure the sheet is published to the web (File → Share → Publish to web), ` +
      `and that tabs are named exactly: <code>nodes</code>, <code>links</code>, <code>type_order</code>, <code>legend</code>. ` +
      `You can also override gids via URL: <code>?nodes=GID&amp;links=GID&amp;type_order=GID&amp;legend=GID</code>.`;
    console.error(err);
  }
})();

// ---------- legend ----------
function renderLegend(legend) {
  const el = document.getElementById("legend");
  // Default order matches screenshot: Published, In Development, Planned, Area
  const fallback = [
    { status: "green",  label: "Published" },
    { status: "orange", label: "In Development" },
    { status: "blue",   label: "Planned" },
    { status: "grey",   label: "Area" }
  ];
  const items = (legend && legend.length ? legend : fallback)
    .map(l => ({ status: l.status, label: l.label || STATUS_LABEL[l.status] || l.status }));
  el.innerHTML = items.map(i =>
    `<span class="item"><span class="swatch" style="background:${STATUS_COLOR[i.status] || '#999'}"></span>${escapeHtml(i.label)}</span>`
  ).join("");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

// ---- iframe auto-height bridge ----
// When this page is embedded in an iframe, post the current content height
// to the parent so the parent can resize the iframe to match. The parent
// must opt in by listening for messages of type "lso-sankey:height".
//
// Parent-side glue (paste into the parent page once):
//   window.addEventListener("message", (e) => {
//     if (e.data && e.data.type === "lso-sankey:height") {
//       const iframe = document.querySelector("iframe[data-lso-sankey]");
//       if (iframe) iframe.style.height = e.data.height + "px";
//     }
//   });
// And mark the iframe with `data-lso-sankey` (or use whatever selector you prefer).
function reportHeightToParent() {
  if (window.parent === window) return; // not in an iframe
  // scrollHeight is the most reliable measure of "what does the content need".
  // Add a tiny buffer for sub-pixel rounding so the parent never clips.
  const h = Math.ceil(document.documentElement.scrollHeight) + 2;
  try {
    window.parent.postMessage({ type: "lso-sankey:height", height: h }, "*");
  } catch (e) { /* cross-origin restrictions — ignore */ }
}

// Compact a URL for display in the tooltip (max ~maxLen chars). Strips protocol
// and query strings, and adds an ellipsis if still over budget.
function truncateUrl(url, maxLen) {
  if (!url) return "";
  let s = url.replace(/^https?:\/\//, "").replace(/\?.*$/, "");
  if (s.length > maxLen) s = s.slice(0, maxLen - 1) + "…";
  return s;
}

// ---------- sankey rendering ----------
function renderSankey({ nodes, links, typeOrder, typeHelp }) {
  const tooltipEl = document.getElementById("tooltip");
  // Map nodes by name
  const byName = new Map(nodes.map(n => [n.name, n]));

  // Filter links to those whose endpoints exist as nodes
  const validLinks = links.filter(l => byName.has(l.source) && byName.has(l.target));

  // Drop nodes that have no links AND don't appear in any column position — keep
  // every node that's in the spreadsheet so the layout matches the source of truth.
  // (d3-sankey will assign them a column based on links; we override with typeOrder below.)

  // Determine column index per node from its `type` and the typeOrder array.
  const colIndex = new Map();
  typeOrder.forEach((t, i) => colIndex.set(t, i));
  const nCols = typeOrder.length;

  // d3-sankey input
  const sankeyNodes = nodes.map(n => ({ ...n }));
  const sankeyLinks = validLinks.map(l => ({
    source: l.source, target: l.target, value: l.value || 1
  }));

  // ============================================================
  //  BENT SANKEY LAYOUT
  // ============================================================
  // The diagram is split into two regions:
  //   - "Horizontal" region: columns 0..BEND_AFTER_COL flow left-to-right (classic Sankey)
  //   - "Vertical"   region: columns BEND_AFTER_COL+1..end flow top-to-bottom
  //                          (a Sankey laid out horizontally, then transposed 90°)
  // The transition happens as "bridge links" that start with a horizontal tangent
  // on the right edge of the last horizontal node and end with a vertical tangent
  // on the top edge of the first vertical node — making the bands curl through 90°.
  //
  // Set BEND_AFTER_COL to the 0-indexed column AFTER which the bend happens.
  // E.g. BEND_AFTER_COL = 2 means columns 0,1,2 are horizontal and 3,4,5,... are vertical.
  const BEND_AFTER_COL = 2;
  const hasBend = BEND_AFTER_COL >= 0 && BEND_AFTER_COL < nCols - 1;

  // Partition the columns
  const hCols = typeOrder.slice(0, BEND_AFTER_COL + 1);            // horizontal-flow columns
  const vCols = typeOrder.slice(BEND_AFTER_COL + 1);                // vertical-flow columns (after bend)
  const hColTypes = new Set(hCols);
  const vColTypes = new Set(vCols);

  // Partition nodes by region
  const hNodes = sankeyNodes.filter(n => hColTypes.has(n.type));
  const vNodes = sankeyNodes.filter(n => vColTypes.has(n.type));

  // Partition links: internal-horizontal, internal-vertical, and bridge (cross-region).
  // A bridge link goes from a horizontal-region node to a vertical-region node.
  const hLinks = [];
  const vLinks = [];
  const bridgeLinks = [];
  sankeyLinks.forEach(l => {
    const sNode = byName.get(l.source);
    const tNode = byName.get(l.target);
    if (!sNode || !tNode) return;
    const sH = hColTypes.has(sNode.type);
    const tH = hColTypes.has(tNode.type);
    if (sH && tH) hLinks.push(l);
    else if (!sH && !tH) vLinks.push(l);
    else if (sH && !tH) bridgeLinks.push(l);
    // (tH && !sH) — backwards link from vertical to horizontal: ignore (shouldn't exist in this data)
  });

  // ---- dimensions ----
  const MIN_INTERNAL_WIDTH = 1400;
  const MAX_INTERNAL_WIDTH = 2200;
  // Right margin reserves room for rotated-row headers ("Service Schema", etc.)
  // when the bend is active. Without the bend, the original 220px is enough for
  // long node labels in the last column.
  // Bottom margin is small because all rotated labels now sit ABOVE their slabs;
  // nothing extends below the bottom row's slab.
  const margin = { top: 36, right: 260, bottom: 40, left: 220 };

  const wrap = document.getElementById("chart-wrap");
  const containerWidth = wrap.clientWidth || window.innerWidth;
  const internalWidth = Math.max(MIN_INTERNAL_WIDTH, Math.min(MAX_INTERNAL_WIDTH, containerWidth));

  // Per-region size budgeting:
  //   - Horizontal region width: enough for hCols columns (left side of canvas)
  //   - Vertical region width:   enough for the widest vertical "row" of nodes (right side)
  //   - Vertical region height:  enough for vCols rows stacked top-to-bottom
  //   - Horizontal region height: tall enough to hold the most-populated horizontal column
  //
  // We allocate a fraction of the canvas width to each region. The vertical region
  // needs to be wide enough that the row with the most nodes fits, with a sensible
  // node-padding budget. The horizontal region uses the rest.
  const nodeWidth = 14;
  const nodePadding = 10;

  // How many nodes are in each column of each region?
  const nodesByType = new Map();
  nodes.forEach(n => {
    if (!nodesByType.has(n.type)) nodesByType.set(n.type, 0);
    nodesByType.set(n.type, nodesByType.get(n.type) + 1);
  });
  const maxNodesInHCol = Math.max(1, ...hCols.map(t => nodesByType.get(t) || 1));
  const maxNodesInVCol = vCols.length
    ? Math.max(1, ...vCols.map(t => nodesByType.get(t) || 1))
    : 1;

  // Estimated minimum width needed for the vertical region so the widest "row"
  // (which becomes a column post-rotation) can hold its nodes. After rotation,
  // each rotated-node consumes about (PER_NODE_HEIGHT) px horizontally — but
  // labels need to read top-to-bottom (rotated 90°), so we need ~14px per node
  // plus padding. For readability, allocate ~36px per node so rotated text
  // labels (which sit above/below each slab) are spaced clear of one another.
  const ROTATED_NODE_SLOT = 36; // horizontal slot per rotated node
  const minVerticalRegionWidth = maxNodesInVCol * ROTATED_NODE_SLOT + 80;

  // Allocate widths. Horizontal region gets at least 50% of inner space, vertical region the rest.
  const innerLeft  = margin.left;
  const innerRight = internalWidth - margin.right;
  const innerWidthAvailable = innerRight - innerLeft;

  const verticalRegionWidth = hasBend
    ? Math.max(minVerticalRegionWidth, Math.min(innerWidthAvailable * 0.45, 700))
    : 0;
  const horizontalRegionWidth = innerWidthAvailable - verticalRegionWidth - (hasBend ? 40 : 0); // 40px gap

  // Heights: horizontal region is tall enough for its tallest column; vertical region's
  // height follows from how many vCols there are (each row needs ~80px of vertical room
  // plus space for the rotated-text labels between rows).
  const PER_NODE_HEIGHT = 22;
  const horizontalRegionHeight = Math.max(360, Math.min(900, maxNodesInHCol * PER_NODE_HEIGHT));

  // Vertical region: need room for vCols rows. Each row is one "column" of nodes (after rotation).
  // Add inter-row spacing so the rotated labels for each row have room to breathe.
  // Labels are rotated 90° and placed above each row, so VROW_SPACING needs to fit
  // the longest label plus padding.
  const VROW_SPACING = 200; // vertical distance between successive rotated-column rows
  const verticalRegionHeight = hasBend ? (vCols.length * VROW_SPACING + 80) : 0;
  // Headroom above the FIRST rotated row's slabs. This is where the bridge bands
  // curve down from the horizontal region into the top of the rotated region —
  // the larger this is, the more graceful the bridge curl, and the further down
  // the page the rotated section starts. Also needs enough room for the FIRST
  // rotated row's labels (which sit above the slab, between the bridge and the slab).
  const VROW_SPACING_TOP_PAD = hasBend ? 280 : 0;

  const innerHeight = hasBend
    ? Math.max(horizontalRegionHeight, VROW_SPACING_TOP_PAD + verticalRegionHeight) + 30
    : horizontalRegionHeight;
  const internalHeight = innerHeight + margin.top + margin.bottom;

  const width  = internalWidth;
  const height = internalHeight;

  const svg = d3.select("#chart")
    .attr("viewBox", `0 0 ${width} ${height}`)
    .attr("preserveAspectRatio", "xMidYMid meet")
    .style("width", "100%")
    .style("height", "auto")
    .style("max-width", `${MAX_INTERNAL_WIDTH}px`)
    .style("display", "block");
  svg.selectAll("*").remove();

  // Region extents (in canvas coordinates)
  const hRegion = {
    x0: innerLeft,
    x1: innerLeft + horizontalRegionWidth,
    y0: margin.top,
    y1: margin.top + horizontalRegionHeight
  };
  const vRegion = {
    x0: hRegion.x1 + 40,
    x1: innerRight,
    y0: hRegion.y0 + VROW_SPACING_TOP_PAD,
    y1: hRegion.y0 + VROW_SPACING_TOP_PAD + verticalRegionHeight
  };

  // ---- Pass 1: layout the HORIZONTAL region ----
  // Includes: all hNodes, plus the vNodes that are direct targets of bridge links
  // (so the d3-sankey layout assigns proper widths/heights to the col-2 source nodes
  // accounting for ALL outgoing flow). The bridge-target nodes get re-positioned in pass 2.
  // Trick: we include the bridge-target nodes as a "phantom column" to the right of hCols
  // so their widths flow into the layout, but we then discard their x/y from this pass.
  const hColIndex = new Map();
  hCols.forEach((t, i) => hColIndex.set(t, i));
  // Phantom column for bridge targets (col index = hCols.length)
  const phantomColCount = hCols.length + (bridgeLinks.length ? 1 : 0);

  // Build the horizontal-pass node list. Bridge-target nodes are duplicated as
  // phantoms (with a marker) to drive the layout, but we'll only use the real nodes' positions.
  const bridgeTargetNames = new Set(bridgeLinks.map(l => l.target));
  const hPassNodes = [
    ...hNodes.map(n => ({ ...n, _region: "h" })),
    ...vNodes.filter(n => bridgeTargetNames.has(n.name)).map(n => ({ ...n, _region: "phantom" }))
  ];
  const hPassLinks = [
    ...hLinks.map(l => ({ ...l })),
    ...bridgeLinks.map(l => ({ ...l }))
  ];

  const sankeyH = d3.sankey()
    .nodeId(d => d.name)
    .nodeWidth(nodeWidth)
    .nodePadding(nodePadding)
    .extent([[hRegion.x0, hRegion.y0], [hRegion.x1, hRegion.y1]])
    .nodeAlign(node => {
      if (node._region === "phantom") return phantomColCount - 1;
      return hColIndex.has(node.type) ? hColIndex.get(node.type) : 0;
    })
    .nodeSort((a, b) => {
      const ao = a.order == null ? Number.POSITIVE_INFINITY : a.order;
      const bo = b.order == null ? Number.POSITIVE_INFINITY : b.order;
      if (ao !== bo) return ao - bo;
      return a.name.localeCompare(b.name);
    });

  const hGraph = sankeyH({
    nodes: hPassNodes.map(d => ({ ...d })),
    links: hPassLinks.map(d => ({ ...d }))
  });

  // Snap horizontal-region nodes to clean column x positions
  const hColXs = d3.range(hCols.length).map(i =>
    hRegion.x0 + i * (horizontalRegionWidth - nodeWidth) / Math.max(1, hCols.length - 1)
  );
  hGraph.nodes.forEach(n => {
    if (n._region === "h") {
      const ci = hColIndex.get(n.type) ?? 0;
      n.x0 = hColXs[ci];
      n.x1 = n.x0 + nodeWidth;
    }
  });

  // Capture the heights/y-extents of bridge-target phantom nodes so we can match them
  // to the corresponding rotated nodes' "lengths" in pass 2. Each phantom's (y1 - y0)
  // represents the total flow into that bridge target, which must match the rotated
  // node's pre-rotation "width" (its post-rotation "height") so bands align.
  const bridgeTargetSize = new Map(); // name -> length (in pixels)
  hGraph.nodes.forEach(n => {
    if (n._region === "phantom") {
      bridgeTargetSize.set(n.name, n.y1 - n.y0);
    }
  });

  // Final list of horizontal-region nodes (real ones only, with positions set)
  const hRealNodes = hGraph.nodes.filter(n => n._region === "h");

  // The bridge link entries from hGraph have correct source-side y geometry but
  // their target-side geometry is on the phantom. We'll re-derive bridge endpoints
  // after pass 2 sets up the rotated targets. Save the source-side data now.
  const bridgeFromHGraph = hGraph.links.filter(l => bridgeTargetNames.has(l.target.name));
  // bridgeFromHGraph entries have: l.source (h-node), l.target (phantom),
  // l.y0 (source-side y center), l.y1 (target-side y center, from phantom — IGNORE),
  // l.width (band thickness)

  // ---- Pass 2: layout the VERTICAL region ----
  // Run a second d3-sankey on the vertical-region subgraph laid out horizontally
  // (left-to-right within a thin band), then transpose to rotate 90° clockwise.
  // After rotation:
  //   - the original x-axis becomes the y-axis (flow direction = downward)
  //   - the original y-axis becomes the x-axis (across the rotated row)
  //
  // Pre-rotation extent: a rectangle of size (verticalRegionHeight, verticalRegionWidth).
  //   - "width" of pre-rotation rect = verticalRegionHeight (the flow direction post-rotation)
  //   - "height" of pre-rotation rect = verticalRegionWidth (the cross-flow span post-rotation)
  let vRealNodes = [];
  let vRealLinks = [];
  let bridgeLinksFinal = [];

  if (hasBend && vNodes.length) {
    const vColIndex = new Map();
    vCols.forEach((t, i) => vColIndex.set(t, i));

    // Pre-rotation extent. The "outer" axis (pre-rotation x) = vertical flow span.
    // The "inner" axis (pre-rotation y) = horizontal span across the rotated row.
    const preRotW = verticalRegionHeight;
    const preRotH = verticalRegionWidth;

    const sankeyV = d3.sankey()
      .nodeId(d => d.name)
      .nodeWidth(nodeWidth)              // pre-rotation node "width" → post-rotation node HEIGHT (flow direction)
      .nodePadding(8)                    // tighter padding pre-rotation since labels run vertically
      .extent([[0, 0], [preRotW, preRotH]])
      .nodeAlign(node => vColIndex.get(node.type) ?? 0)
      // Sort DESCENDING by order in the vertical region so that nodes with
      // lower `order` values end up on the RIGHT of each rotated row, not the
      // LEFT. (Pre-rotation, low-order goes to low-y → top; rotation maps top
      // to left, so flipping the sort here makes low-order map to right.)
      .nodeSort((a, b) => {
        const ao = a.order == null ? Number.POSITIVE_INFINITY : a.order;
        const bo = b.order == null ? Number.POSITIVE_INFINITY : b.order;
        if (ao !== bo) return bo - ao;          // <-- reversed
        return b.name.localeCompare(a.name);    // <-- reversed tiebreaker
      });

    const vGraph = sankeyV({
      nodes: vNodes.map(d => ({ ...d, _region: "v" })),
      links: vLinks.map(d => ({ ...d }))
    });

    // Snap vertical-region nodes to clean pre-rotation column x positions
    const vColXsPre = d3.range(vCols.length).map(i =>
      i * (preRotW - nodeWidth) / Math.max(1, vCols.length - 1)
    );
    vGraph.nodes.forEach(n => {
      const ci = vColIndex.get(n.type) ?? 0;
      n.x0 = vColXsPre[ci];
      n.x1 = n.x0 + nodeWidth;
    });

    // Bridge-target row sizing.
    // The first vCol is the row of bridge targets (e.g. "North-South"). By
    // default d3-sankey would size each node to match its flow-through value,
    // which for incoming-bridge nodes is the sum of incoming bridge band
    // widths — typically a small fraction of the available row width.
    //
    // Instead we STRETCH the bridge-target row so its nodes fill the full
    // available pre-rotation height (= post-rotation width across the row).
    // Each node gets an equal share of the row, padded by VPADDING. Bridge
    // bands then fan out gracefully across each node's wider top edge.
    const firstVColType = vCols[0];
    const firstColNodes = vGraph.nodes.filter(n => n.type === firstVColType);
    // Sort by current y0 to preserve the rotated-sort order (descending by `order`,
    // per nodeSort above) when we repack from cursor=0.
    firstColNodes.sort((a, b) => a.y0 - b.y0);

    const VPADDING = 14; // pre-rotation gap between adjacent bridge-target slabs (post-rotation: gap on row)
    const totalPadding = Math.max(0, firstColNodes.length - 1) * VPADDING;
    // Equal share per node from the available pre-rotation height
    const shareLen = firstColNodes.length
      ? Math.max(2, (preRotH - totalPadding) / firstColNodes.length)
      : 0;
    let cursor = 0;
    firstColNodes.forEach(n => {
      n.y0 = cursor;
      n.y1 = cursor + shareLen;
      cursor = n.y1 + VPADDING;
    });
    // If repacking overflowed the available pre-rotation height, scale down proportionally
    if (cursor > preRotH && cursor > 0) {
      const scale = preRotH / cursor;
      firstColNodes.forEach(n => {
        n.y0 *= scale;
        n.y1 *= scale;
      });
    }

    sankeyV.update(vGraph);

    // Transpose (rotate 90° clockwise) and translate into the vRegion.
    //   - new_x = vRegion.x0 + old_y
    //   - new_y = vRegion.y0 + old_x
    // Node rectangles flip orientation: pre-rotation rect (nodeWidth × nodeHeight)
    // becomes post-rotation (nodeHeight × nodeWidth).
    // We keep node.x0/x1/y0/y1 semantics (top-left and bottom-right of post-rotation rect).
    vGraph.nodes.forEach(n => {
      const oldX0 = n.x0, oldX1 = n.x1, oldY0 = n.y0, oldY1 = n.y1;
      n.x0 = vRegion.x0 + oldY0;
      n.x1 = vRegion.x0 + oldY1;
      n.y0 = vRegion.y0 + oldX0;
      n.y1 = vRegion.y0 + oldX1;
      n._rotated = true;
    });

    // Transpose link source/target endpoints similarly. d3-sankey's link objects
    // expose s.x1, s.y0, etc. via source/target node refs. The pre-computed
    // l.y0 / l.y1 (link endpoint y centers, on a per-band basis) need to be
    // remapped: in pre-rotation, l.y0 is a y-coordinate within the source's
    // y range. After rotation, that becomes an x-coordinate within the source's
    // post-rotation x range.
    // We won't use d3-sankey's stored l.y0/l.y1 directly — instead, we'll
    // recompute paths from scratch using the rotated node geometries.
    vGraph.links.forEach(l => { l._rotated = true; });

    vRealNodes = vGraph.nodes;
    vRealLinks = vGraph.links;

    // ---- Bridge link finalisation ----
    // For each bridge link, we have:
    //   - source: an h-node with computed y geometry (from pass 1)
    //   - target: a v-node with rotated geometry (from pass 2, first vCol)
    // The bridge band needs to:
    //   - leave the source's RIGHT edge at the y-center for this band's slice
    //   - enter the target's TOP edge at the x-center for this band's slice
    // We compute per-link source-y0 (top of band on source side) and
    //          per-link target-x0 (left of band on target side) by accumulating
    // along the source's right edge and the target's top edge.
    //
    // To do this correctly, we need to know each link's "width" (in pixels), the
    // order of bands stacked at each endpoint, and the band's offset within the node.
    // We'll lift this from the pass-1 sankey result: bridgeFromHGraph entries have
    // their source-side y center and width already computed, and we know the order.

    // Build a map from bridge link -> source-side band geometry (from pass 1)
    const bridgeKey = (s, t) => `${s}\u0001${t}`;
    const sourceBandGeom = new Map(); // key -> { y0, y1, width }
    bridgeFromHGraph.forEach(l => {
      const w = l.width;
      // l.y0 is the band CENTER y on the source side (per d3-sankey convention)
      sourceBandGeom.set(bridgeKey(l.source.name, l.target.name), {
        yCenter: l.y0,
        width: w
      });
    });

    // For the target side, we need to lay out the incoming bands on the TOP edge
    // of each rotated target node, in the same order they leave their source columns.
    // Group bridges by target, sum widths, and pack left-to-right across the
    // rotated target node's TOP edge (which spans target.x0 → target.x1).
    const bridgesByTarget = new Map();
    bridgeLinks.forEach(bl => {
      const arr = bridgesByTarget.get(bl.target) || [];
      arr.push(bl);
      bridgesByTarget.set(bl.target, arr);
    });

    const vNodeByName = new Map(vRealNodes.map(n => [n.name, n]));

    bridgesByTarget.forEach((bridgeArr, targetName) => {
      const tNode = vNodeByName.get(targetName);
      if (!tNode) return;

      // Sort bridges arriving at this target by their source-band yCenter (top-to-bottom).
      // After rotation, "top-to-bottom on the source side" maps to "left-to-right on the
      // target's top edge", which keeps the bands from crossing each other through the bend.
      const decorated = bridgeArr.map(bl => {
        const g = sourceBandGeom.get(bridgeKey(bl.source, bl.target));
        return { bl, g, sortKey: g ? g.yCenter : 0 };
      }).sort((a, b) => a.sortKey - b.sortKey);

      // Pack along the target's TOP edge from left (tNode.x0) to right (tNode.x1)
      const totalTopSpan = tNode.x1 - tNode.x0;
      const totalBandWidth = decorated.reduce((s, d) => s + (d.g ? d.g.width : 1), 0);
      // If the sum of band widths exceeds the top edge, scale them down proportionally.
      const scale = totalBandWidth > totalTopSpan ? totalTopSpan / totalBandWidth : 1;
      let cur = tNode.x0;
      decorated.forEach(d => {
        const w = (d.g ? d.g.width : 1) * scale;
        d.targetXLeft = cur;
        d.targetXRight = cur + w;
        d.targetXCenter = cur + w / 2;
        d.bandWidth = w;
        cur += w;
      });

      // Build final bridge link records
      decorated.forEach(d => {
        const g = d.g || { yCenter: 0, width: 1 };
        const sNode = byName.get(d.bl.source);
        // We need the source x1 too — find the corresponding hRealNode
        const sRealNode = hRealNodes.find(n => n.name === d.bl.source);
        if (!sRealNode) return;
        bridgeLinksFinal.push({
          source: sRealNode,
          target: tNode,
          // Source-side band: horizontal exit at sRealNode.x1, centered at yCenter
          sourceX: sRealNode.x1,
          sourceYCenter: g.yCenter,
          // Target-side band: vertical entry at tNode.y0, centered at targetXCenter
          targetXCenter: d.targetXCenter,
          targetY: tNode.y0,
          width: d.bandWidth,
          // Keep originals for tooltip/highlight
          _origSourceName: d.bl.source,
          _origTargetName: d.bl.target,
          value: d.bl.value || 1
        });
      });
    });
  }

  // ---- Build a unified graph object for downstream rendering ----
  // graph.nodes has both regions; graph.links combines internal-h, internal-v,
  // and bridges (bridges marked specially so the path generator handles them).
  const graph = {
    nodes: [...hRealNodes, ...vRealNodes],
    links: [
      ...hGraph.links.filter(l => !bridgeTargetNames.has(l.target.name)),
      ...vRealLinks,
      ...bridgeLinksFinal.map(b => ({ ...b, _bridge: true }))
    ]
  };

  // For convenience downstream, expose a list of column x positions (horizontal region only)
  const colXs = hColXs;

  // Column headers: title text + (?) help icon (when help text exists for that type).
  const headers = svg.append("g").attr("class", "col-headers");

  // Pinned-help-icon state: which icon is currently held open by tap (mobile UX).
  // Stored on `window` so the (idempotent) document-level dismiss handler can
  // clear it cleanly across redraws without leaking listeners.
  if (!window.__lsoSankeyDocClickAttached) {
    document.addEventListener("click", () => {
      if (window.__lsoSankeyPinned) {
        window.__lsoSankeyPinned = null;
        document.getElementById("tooltip").classList.remove("visible");
      }
    });
    window.__lsoSankeyDocClickAttached = true;
  }
  window.__lsoSankeyPinned = null;

  // After the bend, each "column" in the data becomes a "row" of nodes in the
  // rotated section. We place those headers to the LEFT of each row instead of
  // above each column, so they read top-to-bottom alongside the flow direction.
  // To compute the y-position of each rotated row, we average the y-centers of
  // the rotated nodes belonging to that vCol type.
  const rotatedRowY = new Map(); // vCol type -> y center of its row
  if (hasBend) {
    vCols.forEach(t => {
      const rowNodes = vRealNodes.filter(n => n.type === t);
      if (rowNodes.length) {
        const yCenter = d3.mean(rowNodes, n => (n.y0 + n.y1) / 2);
        rotatedRowY.set(t, yCenter);
      }
    });
  }

  typeOrder.forEach((t, i) => {
    const help = typeHelp && typeHelp.get(t);
    const isHorizontalCol = i <= BEND_AFTER_COL;

    let cx, cy, anchor;
    if (isHorizontalCol) {
      cx = hColXs[i] + nodeWidth / 2;
      cy = margin.top - 22;
      anchor = "middle";
    } else {
      // Rotated row: header sits to the RIGHT of the row (past the last slab),
      // vertically centered on the row. We place it at vRegion.x1 + a small gap,
      // anchored "start" so the text reads left-to-right outward from the row.
      // This keeps headers clear of the bridge-curl area to the left of the row.
      cx = vRegion.x1 + 12;
      cy = rotatedRowY.get(t) ?? margin.top - 22;
      anchor = "start";
    }

    const headerGroup = headers.append("g")
      .attr("class", "col-header-group")
      .attr("transform", `translate(${cx}, ${cy})`);

    const titleText = headerGroup.append("text")
      .attr("class", "col-header")
      .attr("text-anchor", anchor)
      .attr("dy", isHorizontalCol ? "0" : "0.35em")
      .text(t);

    if (help) {
      // Measure the title to position the (?) icon just to the right of it.
      // Both horizontal-col headers (anchor=middle) and rotated-row headers
      // (anchor=start) extend their text rightward from x=0 by some amount, so
      // the icon goes a small gap to the right of the bbox right edge.
      const bbox = titleText.node().getBBox();
      const iconX = bbox.x + bbox.width + 10;
      const iconR = 7;

      const helpIcon = headerGroup.append("g")
        .attr("class", "help-icon")
        .attr("transform", `translate(${iconX}, ${isHorizontalCol ? -4 : 0})`)
        .attr("tabindex", 0)
        .attr("role", "button")
        .attr("aria-label", `Help: ${t}`)
        .style("cursor", "pointer");

      helpIcon.append("circle")
        .attr("r", iconR)
        .attr("fill", "#fff")
        .attr("stroke", "#9aa0a6")
        .attr("stroke-width", 1);

      // Info-style "i" glyph: a small dot (tittle) above a short vertical bar (stem).
      // Drawn with primitives so it stays crisp at 14px.
      helpIcon.append("circle")
        .attr("class", "info-tittle")
        .attr("cx", 0).attr("cy", -3)
        .attr("r", 1)
        .attr("fill", "#5f6368")
        .style("pointer-events", "none");

      helpIcon.append("rect")
        .attr("class", "info-stem")
        .attr("x", -0.75).attr("y", -1)
        .attr("width", 1.5).attr("height", 5)
        .attr("rx", 0.5)
        .attr("fill", "#5f6368")
        .style("pointer-events", "none");

      // Hover and focus → show tooltip with help text.
      // Tap (touch/click) → toggle tooltip; tapping outside dismisses (handled above).
      // The tooltip is anchored to the icon's own position (not the cursor) so it
      // appears reliably right next to the icon regardless of how the user got there.
      const showHelpTooltip = () => {
        const iconRect = helpIcon.node().getBoundingClientRect();
        tooltipEl.innerHTML =
          `<strong>${escapeHtml(t)}</strong>` +
          `<div style="margin-top:4px; line-height:1.45; opacity:.95">${escapeHtml(help)}</div>`;
        // With position: fixed, left/top are viewport coordinates. Center horizontally
        // on the icon; the CSS transform pulls the tooltip up so its bottom edge sits
        // 10px above the icon's top edge.
        const x = iconRect.left + iconRect.width / 2;
        const y = iconRect.top;
        tooltipEl.style.left = x + "px";
        tooltipEl.style.top  = y + "px";
        tooltipEl.classList.add("visible");
      };
      const hideHelpTooltip = () => {
        // Don't hide if this icon is currently pinned open by a tap.
        if (window.__lsoSankeyPinned === helpIcon.node()) return;
        tooltipEl.classList.remove("visible");
      };

      helpIcon
        .on("mouseenter", showHelpTooltip)
        .on("mouseleave", hideHelpTooltip)
        .on("focus", showHelpTooltip)
        .on("blur", hideHelpTooltip)
        // Click toggles the pinned state. Stop propagation so the document-level
        // dismiss handler doesn't fire on the same click that opens it.
        .on("click", function (event) {
          event.stopPropagation();
          if (window.__lsoSankeyPinned === this) {
            window.__lsoSankeyPinned = null;
            tooltipEl.classList.remove("visible");
          } else {
            window.__lsoSankeyPinned = this;
            showHelpTooltip();
          }
        });
    }
  });

  // Links (drawn first so nodes sit on top)
  const linkLayer = svg.append("g").attr("class", "links")
    .attr("fill", "none")
    .attr("stroke-linecap", "butt");

  // Path generators for each link kind:
  //  - Horizontal (default): standard d3-sankey horizontal-flow Bézier
  //  - Vertical (rotated):   same shape but rotated 90° clockwise — the curve runs
  //                          from a node's bottom edge into the next node's top edge
  //  - Bridge (elbow):       starts horizontal at the source's right edge, curves
  //                          90° clockwise, ends vertical at the target's top edge
  const horizontalPath = d3.sankeyLinkHorizontal();

  // Vertical-flow Bézier between two rotated nodes. Source's bottom-edge centerline
  // (at x = sourceXCenter on the band, y = sourceY1) curves to target's top-edge
  // centerline (at x = targetXCenter, y = targetY0). Control points sit at the
  // half-way y so the curve's tangents are vertical at both ends.
  function verticalPathForRotatedLink(l) {
    const s = l.source, t = l.target;
    // d3-sankey's link.y0 / link.y1 are *band centers* in the pre-rotation y-axis,
    // which after rotation becomes the post-rotation x-axis. So the band center
    // x-position on the source is (s.x0 + (l.y0 - s.y0_pre)) — but we don't have
    // y0_pre stored. Easier: re-derive band x-centers by accumulating link widths
    // along the source's bottom edge and the target's top edge.
    // We do that pre-pass below, attaching _xs (source x center) and _xt (target x center)
    // to each rotated link.
    const sx = l._xs, tx = l._xt;
    const sy = s.y1, ty = t.y0;
    const my = (sy + ty) / 2;
    return `M${sx},${sy}C${sx},${my} ${tx},${my} ${tx},${ty}`;
  }

  // Bridge elbow path. Starts at (sourceX, sourceYCenter) with horizontal tangent
  // (i.e. heading right), ends at (targetXCenter, targetY) with vertical tangent
  // (i.e. heading down). A cubic Bézier with control points placed to enforce these
  // tangents creates a smooth quarter-turn.
  function bridgeElbowPath(l) {
    const sx = l.sourceX;
    const sy = l.sourceYCenter;
    const tx = l.targetXCenter;
    const ty = l.targetY;
    // Distance to travel horizontally and vertically through the bend.
    const dx = tx - sx;
    const dy = ty - sy;
    // Control points: first CP shifted right from start (horizontal tangent),
    // second CP shifted up from end (vertical tangent). Magnitude ~60% of the
    // respective distance gives a smooth 90° turn that doesn't pinch or overshoot.
    const cp1x = sx + dx * 0.55;
    const cp1y = sy;
    const cp2x = tx;
    const cp2y = ty - dy * 0.55;
    return `M${sx},${sy}C${cp1x},${cp1y} ${cp2x},${cp2y} ${tx},${ty}`;
  }

  // ---- Pre-pass for vertical-region links: compute band x-centers ----
  // d3-sankey populated link.y0 (source-side center) and link.y1 (target-side center)
  // in pre-rotation coords. We need to translate those to post-rotation x-coords,
  // which are simply (vRegion.x0 + pre_y_center).
  graph.links.forEach(l => {
    if (l._rotated) {
      // After rotation, source-side band center x = vRegion.x0 + l.y0 (pre-rotation)
      // and target-side band center x = vRegion.x0 + l.y1 (pre-rotation).
      // BUT — d3-sankey may have already mutated l.y0/l.y1 if .update() was called
      // post-rotation (it wasn't here), so these are still pre-rotation values.
      l._xs = vRegion.x0 + l.y0;
      l._xt = vRegion.x0 + l.y1;
    }
  });

  // ---- Draw all links with a unified selection but path-by-kind ----
  const linkSel = linkLayer.selectAll("path")
    .data(graph.links)
    .join("path")
      .attr("class", "link")
      .attr("d", l => {
        if (l._bridge) return bridgeElbowPath(l);
        if (l._rotated) return verticalPathForRotatedLink(l);
        return horizontalPath(l);
      })
      .attr("stroke-width", l => Math.max(1, l.width || l.bandWidth || 1));

  // Nodes
  const nodeLayer = svg.append("g").attr("class", "nodes");

  const nodeG = nodeLayer.selectAll("g.node")
    .data(graph.nodes)
    .join("g")
      .attr("class", "node");

  nodeG.append("rect")
    .attr("x", d => d.x0)
    .attr("y", d => d.y0)
    .attr("width", d => d.x1 - d.x0)
    .attr("height", d => Math.max(2, d.y1 - d.y0))
    .attr("fill", d => STATUS_COLOR[d.status] || "var(--status-area)")
    .attr("rx", 1)
    .attr("ry", 1);

  // Label placement strategy:
  //
  // For HORIZONTAL-region nodes (cols 0..BEND_AFTER_COL), labels sit beside the
  // narrow vertical bar — to the LEFT of each rect. (After the bend, the
  // horizontal region only goes up to col BEND_AFTER_COL, and putting labels on
  // the LEFT for every horizontal-region column matches the original style.)
  //
  // For ROTATED nodes (vCols, post-rotation), nodes are wide horizontal slabs
  // with bands flowing down through them. There's not enough horizontal room
  // between adjacent slabs to fit horizontal labels without overlap, so labels
  // are ROTATED 90° and ALL sit ABOVE their slab, reading bottom-to-top.
  // With anchor=start and rotate(-90), text starts at the rotation origin
  // (placed just above the slab) and extends upward. The label for the bottom
  // row therefore sits in the gap between the row above it and its own slab —
  // so VROW_SPACING must be tall enough to accommodate the longest label.

  // Render a label as a <text> element with computed position/anchor/rotation,
  // returning the d3 selection so the caller can wrap it in <a> or attach handlers.
  function appendLabel(parentSel, d) {
    const txt = parentSel.append("text").text(d.name);
    if (d._rotated) {
      const cx = (d.x0 + d.x1) / 2;
      const y = d.y0 - 4;
      txt
        .attr("x", 0).attr("y", 0)
        .attr("text-anchor", "start")
        .attr("transform", `translate(${cx}, ${y}) rotate(-90)`)
        .attr("dy", "0.35em");
    } else {
      // Horizontal-region: label LEFT of the bar
      txt
        .attr("x", d.x0 - 6)
        .attr("y", (d.y0 + d.y1) / 2)
        .attr("dy", "0.35em")
        .attr("text-anchor", "end");
    }
    return txt;
  }

  // For nodes WITH a url, wrap the label in an SVG <a>; for nodes without, plain <text>.
  // We also propagate hover/click events from the link into the same highlight pipeline
  // used by the rect-hit-area, so hovering a label highlights its flow.
  nodeG.each(function (d) {
    const g = d3.select(this);
    if (d.url) {
      const a = g.append("a")
        .attr("href", d.url)
        .attr("target", "_blank")
        .attr("rel", "noopener noreferrer")
        .attr("aria-label", `${d.name} — opens in a new tab`);
      appendLabel(a, d);
      a.on("mouseenter", function (event) { highlightNode(d, event); })
       .on("mouseleave", function () { clearHighlight(); })
       .on("click", function () { clearHighlight(); });
    } else {
      appendLabel(g, d);
    }
  });

  // Invisible wider hit area over each rect so clicks/hovers are easy
  nodeG.append("rect")
    .attr("class", "node-hit")
    .attr("x", d => d.x0 - 4)
    .attr("y", d => d.y0 - 2)
    .attr("width", d => (d.x1 - d.x0) + 8)
    .attr("height", d => Math.max(2, d.y1 - d.y0) + 4)
    .style("cursor", d => d.url ? "pointer" : "default")
    .on("click", (event, d) => {
      if (d.url) {
        clearHighlight();
        window.open(d.url, "_blank", "noopener,noreferrer");
      }
    })
    .on("mouseenter", function (event, d) { highlightNode(d, event); })
    .on("mouseleave", function () { clearHighlight(); });

  // Build adjacency for highlight propagation
  const incoming = new Map();
  const outgoing = new Map();
  graph.links.forEach(l => {
    if (!incoming.has(l.target.name)) incoming.set(l.target.name, []);
    if (!outgoing.has(l.source.name)) outgoing.set(l.source.name, []);
    incoming.get(l.target.name).push(l);
    outgoing.get(l.source.name).push(l);
  });

  function highlightNode(d, event) {
    // Find all links/nodes connected upstream and downstream
    const visitedNodes = new Set([d.name]);
    const visitedLinks = new Set();

    function walk(name, dir) {
      const edges = (dir === "up" ? incoming : outgoing).get(name) || [];
      for (const l of edges) {
        if (visitedLinks.has(l)) continue;
        visitedLinks.add(l);
        const next = dir === "up" ? l.source.name : l.target.name;
        if (!visitedNodes.has(next)) {
          visitedNodes.add(next);
          walk(next, dir);
        }
      }
    }
    walk(d.name, "up");
    walk(d.name, "down");

    linkSel
      .classed("highlight", l => visitedLinks.has(l))
      .classed("dim",       l => !visitedLinks.has(l));
    nodeG
      .classed("dim", n => !visitedNodes.has(n.name));

    // Tooltip — viewport coordinates (position: fixed)
    const statusText = d.status ? " · " + escapeHtml(STATUS_LABEL[d.status] || d.status) : "";
    const urlLine = d.url
      ? `<br><span style="opacity:.7; font-size:11px">↗ Click to open · ${escapeHtml(truncateUrl(d.url, 60))}</span>`
      : "";
    tooltipEl.innerHTML =
      `<strong>${escapeHtml(d.name)}</strong><br>` +
      `<span style="opacity:.85">${escapeHtml(d.type || "")}${statusText}</span>` +
      urlLine;
    tooltipEl.style.left = event.clientX + "px";
    tooltipEl.style.top  = event.clientY + "px";
    tooltipEl.classList.add("visible");
  }
  function clearHighlight() {
    linkSel.classed("highlight", false).classed("dim", false);
    nodeG.classed("dim", false);
    tooltipEl.classList.remove("visible");
  }
}
</script>
</body>
</html>
